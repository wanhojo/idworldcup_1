<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 월드컵 스타 이상형 월드컵</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
  .app{width:100%;max-width:520px}
  .header{text-align:center;margin-bottom:1rem}
  .header h1{font-size:22px;font-weight:700;color:#0a1628}
  .header p{font-size:13px;color:#7a8ba0;margin-top:4px}
  .prog-wrap{background:#dde3ea;border-radius:99px;height:6px;margin:.75rem 0 .5rem;overflow:hidden}
  .prog-fill{height:6px;background:linear-gradient(90deg,#185FA5,#2196F3);border-radius:99px;transition:width .4s}
  .round-lbl{text-align:center;font-size:11px;font-weight:700;color:#7a8ba0;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem}
  .stats{display:flex;justify-content:center;gap:28px;margin-bottom:1rem}
  .stat{text-align:center}
  .stat-n{font-size:20px;font-weight:700;color:#0a1628}
  .stat-l{font-size:11px;color:#7a8ba0}
  .matchup{display:grid;grid-template-columns:1fr 36px 1fr;gap:10px;align-items:center}
  .pbtn{background:#fff;border:1.5px solid #dde3ea;border-radius:18px;padding:16px 8px 14px;cursor:pointer;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .pbtn:hover{border-color:#185FA5;transform:translateY(-3px);box-shadow:0 6px 20px rgba(24,95,165,.15)}
  .pbtn:active{transform:translateY(0)}
  .pbtn.win{border:2.5px solid #185FA5;background:#EBF4FD;box-shadow:0 4px 16px rgba(24,95,165,.2)}
  .pbtn.lose{opacity:.25;pointer-events:none}
  .pname{font-size:13px;font-weight:700;color:#0a1628;line-height:1.3}
  .pcountry{font-size:11px;color:#7a8ba0}
  .vs{text-align:center;font-size:13px;font-weight:700;color:#b0bec5}
  .hint{text-align:center;font-size:12px;color:#b0bec5;margin-top:10px}
  .result-box{text-align:center;padding:2.5rem 1rem 2rem;background:#fff;border-radius:20px;border:1.5px solid #dde3ea;margin-top:.5rem;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .res-label{font-size:13px;color:#7a8ba0;margin-bottom:12px}
  .res-name{font-size:26px;font-weight:700;color:#185FA5;margin:12px 0 4px}
  .res-country{font-size:14px;color:#7a8ba0;margin-bottom:20px}
  .trophy{font-size:48px;margin-bottom:8px}
  .restart-btn{background:#185FA5;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;transition:background .15s}
  .restart-btn:hover{background:#0d4a8a}
  @media(max-width:400px){.pname{font-size:12px}.pbtn{padding:12px 6px 10px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚽ 월드컵 스타 이상형 월드컵</h1>
    <p>전세계 64인의 슈퍼스타 · 2026 FIFA 월드컵</p>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="round-lbl" id="rlbl"></div>
  <div class="stats" id="stats"></div>
  <div id="area"></div>
  <div class="hint" id="hint">더 마음에 드는 선수를 골라주세요!</div>
</div>

function makeSVG(p){
  const s=p.skin, h=p.hair, k1=p.kit1, k2=p.kit2, n=p.num||'';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" width="80" height="90">
  <!-- shadow -->
  <ellipse cx="40" cy="87" rx="18" ry="4" fill="#00000015"/>
  <!-- body / kit -->
  <path d="M20,52 Q16,50 14,60 L14,82 Q14,84 16,84 L26,84 L26,62 Z" fill="${k1}"/>
  <path d="M60,52 Q64,50 66,60 L66,82 Q66,84 64,84 L54,84 L54,62 Z" fill="${k1}"/>
  <path d="M26,48 L26,84 L54,84 L54,48 Q47,52 40,52 Q33,52 26,48 Z" fill="${k1}"/>
  <!-- kit stripe -->
  <rect x="36" y="52" width="8" height="32" fill="${k2}" opacity=".35"/>
  <!-- number -->
  <text x="40" y="73" text-anchor="middle" font-size="11" font-weight="bold" fill="${k2}" font-family="Arial">${n}</text>
  <!-- neck -->
  <rect x="36" y="42" width="8" height="10" fill="${s}" rx="2"/>
  <!-- head -->
  <ellipse cx="40" cy="36" rx="14" ry="16" fill="${s}"/>
  <!-- hair -->
  <ellipse cx="40" cy="22" rx="14" ry="10" fill="${h}"/>
  <rect x="26" y="22" width="28" height="8" fill="${h}"/>
  <!-- hair style detail -->
  ${p.hairStyle||''}
  <!-- ears -->
  <ellipse cx="26" cy="37" rx="3" ry="4" fill="${s}"/>
  <ellipse cx="54" cy="37" rx="3" ry="4" fill="${s}"/>
  <!-- eyes -->
  <ellipse cx="35" cy="36" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="45" cy="36" rx="3" ry="3.5" fill="white"/>
  <circle cx="${p.eyeX1||35}" cy="37" r="2" fill="${p.eyeColor||'#3a2a1a'}"/>
  <circle cx="${p.eyeX2||45}" cy="37" r="2" fill="${p.eyeColor||'#3a2a1a'}"/>
  <circle cx="${(p.eyeX1||35)+0.6}" cy="36.2" r=".7" fill="white"/>
  <circle cx="${(p.eyeX2||45)+0.6}" cy="36.2" r=".7" fill="white"/>
  <!-- eyebrows -->
  <path d="M32,31.5 Q35,30 38,31.5" stroke="${h}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M42,31.5 Q45,30 48,31.5" stroke="${h}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="40" cy="41" rx="2" ry="1.5" fill="${s}" stroke="#00000020" stroke-width=".5"/>
  <!-- mouth / smile -->
  <path d="${p.mouth||'M36,46 Q40,49 44,46'}" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- beard if any -->
  ${p.beard||''}
  <!-- flag badge -->
  <text x="40" y="10" text-anchor="middle" font-size="13">${p.flag}</text>
</svg>`;
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let bracket=[],cur=0,winners=[],done=0;
const TOTAL=63;

function getRound(n){
  if(n>=64)return"64강";if(n>=32)return"32강";if(n>=16)return"16강";
  if(n>=8)return"8강";if(n>=4)return"4강";if(n>=2)return"결승";return "우승";
}

function start(){bracket=shuffle(players);cur=0;winners=[];done=0;render()}

function render(){
  const area=document.getElementById('area');
  const prog=document.getElementById('prog');
  const rlbl=document.getElementById('rlbl');
  const stats=document.getElementById('stats');
  const hint=document.getElementById('hint');
  prog.style.width=(done/TOTAL*100).toFixed(1)+'%';
  if(bracket.length===1){endScreen(bracket[0]);hint.textContent='';return;}
  const p1=bracket[cur*2],p2=bracket[cur*2+1];
  const total=Math.floor(bracket.length/2);
  rlbl.textContent=getRound(bracket.length)+' · '+(cur+1)+'/'+total;
  hint.textContent='더 마음에 드는 선수를 골라주세요!';
  stats.innerHTML=
    '<div class="stat"><div class="stat-n">'+bracket.length+'</div><div class="stat-l">남은 선수</div></div>'+
    '<div class="stat"><div class="stat-n">'+done+'</div><div class="stat-l">완료 경기</div></div>'+
    '<div class="stat"><div class="stat-n">'+(TOTAL-done)+'</div><div class="stat-l">남은 경기</div></div>';
  area.innerHTML='<div class="matchup">'+card(p1,0)+'<div class="vs">vs</div>'+card(p2,1)+'</div>';
}

function card(p,idx){
  return '<button class="pbtn" id="b'+idx+'" onclick="pick('+idx+')">'+
    makeSVG(p)+
    '<div class="pname">'+p.name+'</div>'+
    '<div class="pcountry">'+p.country+' '+p.flag+'</div>'+
  '</button>';
}

function pick(idx){
  const b0=document.getElementById('b0'),b1=document.getElementById('b1');
  idx===0?(b0.classList.add('win'),b1.classList.add('lose')):(b1.classList.add('win'),b0.classList.add('lose'));
  setTimeout(()=>{
    const chosen=bracket[cur*2+idx];
    winners.push(chosen);cur++;done++;
    if(cur>=Math.floor(bracket.length/2)){
      if(bracket.length%2===1)winners.push(bracket[bracket.length-1]);
      bracket=[...winners];winners=[];cur=0;
    }
    render();
  },300);
}

function endScreen(p){
  document.getElementById('rlbl').textContent='🏆 최종 우승';
  document.getElementById('stats').innerHTML='';
  document.getElementById('prog').style.width='100%';
  document.getElementById('hint').textContent='';
  document.getElementById('area').innerHTML=
    '<div class="result-box">'+
      '<div class="trophy">🏆</div>'+
      '<div class="res-label">나의 이상형은...</div>'+
      '<div style="display:flex;justify-content:center;margin:8px 0">'+makeSVG({...p,num:p.num})+'</div>'+
      '<div class="res-name">'+p.name+'</div>'+
      '<div class="res-country">'+p.country+' '+p.flag+'</div>'+
      '<button class="restart-btn" onclick="done=0;start()">다시 하기 ↺</button>'+
    '</div>';
}

start();
</script>
