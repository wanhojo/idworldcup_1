<meta charset="UTF-8">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f7fa;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
  .app{width:100%;max-width:540px}
  .header{text-align:center;margin-bottom:1.25rem}
  .header h1{font-size:22px;font-weight:600;color:#111}
  .header p{font-size:13px;color:#888;margin-top:4px}
  .prog-wrap{background:#e0e0e0;border-radius:99px;height:6px;margin:0.75rem 0 0.5rem;overflow:hidden}
  .prog-fill{height:6px;background:#185FA5;border-radius:99px;transition:width 0.4s}
  .round-lbl{text-align:center;font-size:11px;font-weight:600;color:#888;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.75rem}
  .stats{display:flex;justify-content:center;gap:28px;margin-bottom:1rem}
  .stat{text-align:center}
  .stat-n{font-size:20px;font-weight:600;color:#111}
  .stat-l{font-size:11px;color:#888}
  .matchup{display:grid;grid-template-columns:1fr 36px 1fr;gap:10px;align-items:center}
  .pbtn{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:18px 10px;cursor:pointer;text-align:center;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
  .pbtn:hover{border-color:#185FA5;transform:translateY(-2px);box-shadow:0 4px 16px rgba(24,95,165,0.12)}
  .pbtn:active{transform:translateY(0)}
  .pbtn.win{border:2.5px solid #185FA5;background:#EBF4FD}
  .pbtn.lose{opacity:0.28;pointer-events:none}
  .avatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;border:1.5px solid rgba(0,0,0,0.07)}
  .pname{font-size:14px;font-weight:600;color:#111;line-height:1.3}
  .pcountry{font-size:11px;color:#888}
  .vs{text-align:center;font-size:12px;font-weight:600;color:#bbb}
  .hint{text-align:center;font-size:12px;color:#aaa;margin-top:10px}
  .result-box{text-align:center;padding:2.5rem 1rem 2rem;background:#fff;border-radius:20px;border:1.5px solid #e0e0e0;margin-top:0.5rem;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
  .res-avatar{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:52px;margin:0 auto 16px;border:3.5px solid #185FA5;background:#EBF4FD}
  .res-label{font-size:13px;color:#aaa;margin-bottom:8px}
  .res-name{font-size:28px;font-weight:700;color:#185FA5;margin:4px 0}
  .res-country{font-size:14px;color:#888;margin-bottom:20px}
  .trophy{font-size:40px;margin-bottom:8px}
  .restart-btn{background:#185FA5;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;color:#fff}
  .restart-btn:hover{background:#0d4a8a}
  @media(max-width:400px){
    .avatar{width:62px;height:62px;font-size:28px}
    .pname{font-size:13px}
    .pbtn{padding:14px 8px}
  }
</style>

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let bracket=[],cur=0,winners=[],done=0;
const TOTAL=63;

function getRound(n){
  if(n>=64)return"64강";if(n>=32)return"32강";if(n>=16)return"16강";
  if(n>=8)return"8강";if(n>=4)return"4강";if(n>=2)return"결승";return"우승";
}

function start(){bracket=shuffle(players);cur=0;winners=[];done=0;render()}

function render(){
  const area=document.getElementById('area');
  const prog=document.getElementById('prog');
  const rlbl=document.getElementById('rlbl');
  const stats=document.getElementById('stats');
  const hint=document.getElementById('hint');
  prog.style.width=(done/TOTAL*100).toFixed(1)+'%';
  if(bracket.length===1){endScreen(bracket[0]);hint.textContent='';return;}
  const p1=bracket[cur*2],p2=bracket[cur*2+1];
  const total=Math.floor(bracket.length/2);
  rlbl.textContent=getRound(bracket.length)+' · '+(cur+1)+'/'+total;
  hint.textContent='더 마음에 드는 선수를 골라주세요!';
  stats.innerHTML=
    '<div class="stat"><div class="stat-n">'+bracket.length+'</div><div class="stat-l">남은 선수</div></div>'+
    '<div class="stat"><div class="stat-n">'+done+'</div><div class="stat-l">완료 경기</div></div>'+
    '<div class="stat"><div class="stat-n">'+(TOTAL-done)+'</div><div class="stat-l">남은 경기</div></div>';
  area.innerHTML=
    '<div class="matchup">'+
      card(p1,0)+
      '<div class="vs">vs</div>'+
      card(p2,1)+
    '</div>';
}

function card(p,idx){
  return '<button class="pbtn" id="b'+idx+'" onclick="pick('+idx+')">'+
    '<div class="avatar" style="background:'+p.color+'">'+p.avatar+'</div>'+
    '<div class="pname">'+p.name+'</div>'+
    '<div class="pcountry">'+p.country+'</div>'+
  '</button>';
}

function pick(idx){
  const b0=document.getElementById('b0');
  const b1=document.getElementById('b1');
  idx===0?(b0.classList.add('win'),b1.classList.add('lose')):(b1.classList.add('win'),b0.classList.add('lose'));
  setTimeout(()=>{
    const chosen=bracket[cur*2+idx];
    winners.push(chosen);cur++;done++;
    const total=Math.floor(bracket.length/2);
    if(cur>=total){
      if(bracket.length%2===1)winners.push(bracket[bracket.length-1]);
      bracket=[...winners];winners=[];cur=0;
    }
    render();
  },300);
}

function endScreen(p){
  document.getElementById('rlbl').textContent='🏆 최종 우승';
  document.getElementById('stats').innerHTML='';
  document.getElementById('prog').style.width='100%';
  document.getElementById('area').innerHTML=
    '<div class="result-box">'+
      '<div class="trophy">🏆</div>'+
      '<div class="res-label">나의 이상형은...</div>'+
      '<div class="res-avatar" style="background:'+p.color+'">'+p.avatar+'</div>'+
      '<div class="res-name">'+p.name+'</div>'+
      '<div class="res-country">'+p.country+'</div>'+
      '<button class="restart-btn" onclick="done=0;start()">다시 하기 ↺</button>'+
    '</div>';
}

start();
</script>

</html>
